// Plural/singular common suffix variants to try when no direct hit
function generateVariants(word) {
  const variants = new Set([word]);
  // Dual form: بيضتين/بيضتان → بيضة → بيض (try before generic ين stripping)
  if (/ت(ين|ان)$/.test(word) && word.length > 4) variants.add(word.replace(/ت(ين|ان)$/, ""));
  // Strip trailing ة/ه (ta marbuta already normalized to ه)
  if (word.endsWith("ه") && word.length > 3) variants.add(word.slice(0, -1));
  // Strip plural ات
  if (word.endsWith("ات") && word.length > 4) variants.add(word.slice(0, -2));
  // Strip plural/dual ين/ون
  if ((word.endsWith("ين") || word.endsWith("ون")) && word.length > 4) variants.add(word.slice(0, -2));
  return [...variants];
}

// ═══════════════════════════════════════════════════════════════
// SMART FOOD MATCHER — normalization + aliases + plural handling
// Used by both NLP free-text parser and manual search
// ═══════════════════════════════════════════════════════════════
// Pre-normalize FOODS once for fast repeated lookups
const FOODS_NORM = FOODS.map(f => ({
  f,
  normAr: normalizeAr(f.nameAr),
  normFr: normalizeAr(f.nameFr),
  wordsAr: normalizeAr(f.nameAr).split(" ").filter(Boolean),
}));

function matchFood(rawQuery) {
  if (!rawQuery || !rawQuery.trim()) return null;
  const q = normalizeAr(rawQuery);
  if (!q) return null;

  // 1) Exact full-string match (highest confidence)
  let hit = FOODS_NORM.find(x => x.normAr === q || x.normFr === q);
  if (hit) return { food: hit.f, confidence: 100 };

  // 2) Alias dictionary lookup (colloquial → canonical)
  const aliasKey = Object.keys(FOOD_ALIASES).find(k => normalizeAr(k) === q);
  if (aliasKey) {
    const canonicalNames = FOOD_ALIASES[aliasKey].map(normalizeAr);
    hit = FOODS_NORM.find(x => canonicalNames.includes(x.normAr));
    if (hit) return { food: hit.f, confidence: 95 };
  }

  // 3) Word-level matching with plural/singular variants
  const qWords = q.split(" ").filter(w => w.length >= 2);
  const qVariantSets = qWords.map(w => generateVariants(w));

  let best = null, bestScore = 0, bestWordHits = 0;
  for (const entry of FOODS_NORM) {
    let score = 0;
    let wordHits = 0;

    // Whole-string containment — but only count it when it's a safe match:
    // either an exact word-boundary substring, or the food name is reasonably long
    // relative to query (prevents short names like "تين" matching inside "بيضتين")
    const wordBoundaryIn = (needle, haystack) =>
      new RegExp("(^|\\s)" + needle.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + "(\\s|$)").test(haystack);

    if (entry.normAr === q) {
      score += 80;
    } else if (wordBoundaryIn(entry.normAr, q) || wordBoundaryIn(q, entry.normAr)) {
      score += 60;
    } else if (entry.normAr.length >= 4 && (entry.normAr.includes(q) || q.includes(entry.normAr)) && entry.normAr.length <= q.length + 2) {
      // Only allow loose substring match when lengths are close (avoids tiny-word false hits)
      score += 30;
    }

    // Word-by-word matching, trying all variants of each query word
    for (const variants of qVariantSets) {
      const matched = entry.wordsAr.some(fw =>
        variants.some(v => fw === v || (v.length>=3 && fw.startsWith(v)) || (fw.length>=3 && v.startsWith(fw)))
      );
      if (matched) { score += 18; wordHits++; }
    }

    // First-word bonus (people usually lead with the main food name)
    if (qWords[0] && entry.wordsAr[0] &&
        (entry.wordsAr[0] === qWords[0] ||
         (qWords[0].length>=3 && entry.wordsAr[0].startsWith(qWords[0])) ||
         (entry.wordsAr[0].length>=3 && qWords[0].startsWith(entry.wordsAr[0])))) {
      score += 12;
    }

    if (score > bestScore) { bestScore = score; best = entry.f; bestWordHits = wordHits; }
  }

  // SAFETY CHECK: for multi-word queries (e.g. a full sentence), require that
  // at least a meaningful fraction of the query words actually matched the food.
  // This prevents a long unrelated sentence from being force-matched to a food
  // based on a single coincidental word overlap.
  if (qWords.length >= 3 && bestWordHits < 2 && bestScore < 60) {
    return null;
  }

  if (best && bestScore >= 18) {
    const confidence = Math.min(90, 40 + bestScore);
    return { food: best, confidence };
  }
  return null;
}

const calcTDEE=(b,act)=>b*({sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9}[act]||1.375);
const calcTargets=(tdee,goal,w,customAdj)=>{
  const baseAdj={lose:-500,gain:300,muscle:200,maintain:0}[goal]||0;
  const adj = customAdj!=null ? customAdj : baseAdj;

  return{calories:Math.round(Math.max(cal,1000)),protein:prot,fat,carbs:carb,adj};
};

// DESC SEARCH — وصف الوجبة + تحليل ذكي محلي
// ═══════════════════════════════════════════════════════════════
function DescSearch({dark, onAdd, onClose}) {
  const [mode, setMode] = useState("search");
  const [txt, setTxt] = useState("");
  const [results, setResults] = useState([]);
  const [sel, setSel] = useState(null);
  const [grams, setGrams] = useState(100);
  const [parsed, setParsed] = useState([]);

  // ── كميات شائعة → غرام ─────────────────────────────────
  const UNIT_MAP = [
    // [pattern, grams_per_unit]
    [/كوب(?:ين)?/,     240],
    [/كأس(?:ين)?/,     200],
    [/طبق(?:ين)?/,     300],
    [/صحن(?:ين)?/,     300],
    [/حصة(?:تين)?/,    150],
    [/رغيف(?:ين)?/,    100],
    [/شريحة|شرايح/,    30],
    [/قطعة|قطع/,       80],
    [/حبة|حبتين|حبات/, 100],
    [/علبة(?:تين)?/,   400],
    [/ملعقة كبيرة/,    15],
    [/ملعقة صغيرة/,    5],
    [/ملعقة(?:تين)?/,  15],
    [/ملم|ml/i,        1],
    [/مل\b/,           1],
    [/لتر/,            1000],
    [/كغ|كيلو/,        1000],
    [/غرام|غ\b|جرام|g\b/i, 1],
  ];

  const parseAmount = (seg) => {
    // Extract number (including Arabic numerals and written numbers)
    const written = {"واحد":1,"واحدة":1,"اثنين":2,"ثلاثة":3,"ثلاث":3,"أربعة":4,"أربع":4,"خمسة":5,"خمس":5};
    let num = 1;
    const numMatch = seg.match(/(\d+(?:\.\d+)?)/);
    if(numMatch) num = parseFloat(numMatch[1]);
    else {
      for(const [word, val] of Object.entries(written)) {
        if(seg.includes(word)) { num = val; break; }
      }
    }
    // Find unit
    for(const [pat, factor] of UNIT_MAP) {
      if(pat.test(seg)) return Math.round(num * factor);
    }
    // If pure number with no unit → assume grams
    if(numMatch) return Math.round(num);
    return null; // no amount found
  };

  // ── محلل النص الرئيسي ──────────────────────────────────
  const analyzeText = () => {
    if(!txt.trim()) return;

    // Split text into food segments by connectors
    const raw = txt.trim();
    // Split into food segments
    // Strategy: split by comma/newline first, then by "و/مع" connectors between food items
    let rawSegs = raw.split(/[،,\n]/).map(s=>s.trim()).filter(s=>s.length>1);
    // Further split each segment by "و" or "مع" if it looks like a connector
    const segs = [];
    for(const seg of rawSegs) {
      // Split "X مع Y" and "X و Y" but only if not part of a number phrase
      const parts = seg.split(/\s+(?:مع|و)\s+(?=\d|[\u0600-\u06FF])/).map(s=>s.trim()).filter(s=>s.length>1);
      segs.push(...parts);
    }

    const items = [];

    for(const seg of segs) {
      // Try multiple extraction patterns
      let foodName = null, amountG = null;

      // Pattern A: "200 ملم حليب" or "350 غرام كسكس"
      const pA = seg.match(/^(\d+(?:\.\d+)?)\s*(غرام|غ|g\b|جرام|مل|ملم|ml|كغ|كيلو|لتر)\s+(.+)/i);
      if(pA) {
        const num = parseFloat(pA[1]);
        const unit = pA[2];
        foodName = pA[3].trim();
        const factor = UNIT_MAP.find(([p])=>p.test(unit));
        amountG = Math.round(num * (factor?factor[1]:1));
      }

      // Pattern B: "كوب حليب" or "طبق كسكس"
      if(!foodName) {
        const unitWords = ["كوب","كأس","طبق","صحن","حصة","رغيف","شريحة","قطعة","حبة","علبة","ملعقة كبيرة","ملعقة صغيرة","ملعقة"];
        for(const uw of unitWords) {
          if(seg.startsWith(uw) || seg.includes(uw+' ')) {
            const parts = seg.split(uw).filter(Boolean);
            const after = parts[parts.length-1].trim();
            if(after.length>1) {
              foodName = after;
              // Extract multiplier if any
              const mult = parseInt(seg) || 1;
              amountG = parseAmount(uw) * mult;
              break;
            }
          }
        }
      }

      // Pattern C: "كسكس 400 غرام" or "حليب 200"
      if(!foodName) {
        const pC = seg.match(/^(.+?)\s+(\d+(?:\.\d+)?)\s*(غرام|غ|g\b|جرام|مل|ملم|ml|كغ)?$/i);
        if(pC) {
          const candidate = pC[1].trim();
          if(candidate.length>1 && isNaN(parseFloat(candidate))) {
            foodName = candidate;
            const num = parseFloat(pC[2]);
            const unit = pC[3]||"غرام";
            const factor = UNIT_MAP.find(([p])=>p.test(unit));
            amountG = Math.round(num * (factor?factor[1]:1));
          }
        }
      }

      // Pattern D: just the food name
      if(!foodName) {
        foodName = seg.replace(/\d+/g,'').trim();
        amountG = parseAmount(seg);
      }

      if(!foodName || foodName.length < 2) continue;
      const finalGrams = amountG || 100;

      // ── البحث في قاعدة البيانات ───────────────────────
      const q = normalizeAr(foodName);
      const words = q.split(' ').filter(w=>w.length>2);

      let best = null, bestScore = 0;

      for(const f of FOODS_NORM) {
        let score = 0;
        const fn = f.normAr;
        const ff = normalizeAr(f.normFr||'');

        if(fn === q) score = 100;
        else if(fn.includes(q) && q.length>=3) score = 85;
        else if(q.includes(fn) && fn.length>=3) score = 80;
        else if(words.length>0 && words.every(w=>fn.includes(w))) score = 75;
        else if(words.some(w=>w.length>3 && fn.includes(w))) score = 60;
        else if(ff && (ff.includes(q)||q.includes(ff)) && q.length>=3) score = 55;

        // Alias check
        if(score===0) {
          const ak = Object.keys(FOOD_ALIASES).find(k=>normalizeAr(k)===q||normalizeAr(k).includes(q));
          if(ak) {
            const canonical = FOOD_ALIASES[ak][0];
            const hit = FOODS_NORM.find(x=>x.normAr===normalizeAr(canonical));
            if(hit) { best = hit.f; bestScore = 72; continue; }
          }
        }

        if(score > bestScore) { bestScore = score; best = f.f; }
      }

      if(best && bestScore >= 55) {
        const g = finalGrams;
        items.push({
          food: best, grams: g, confidence: bestScore,
          cal:  Math.round(best.cal  * g/100),
          prot: Math.round(best.prot * g/100*10)/10,
          carb: Math.round(best.carb * g/100*10)/10,
          fat:  Math.round(best.fat  * g/100*10)/10,
          fiber:Math.round((best.fiber||0)*g/100*10)/10,
        });
      } else {
        items.push({unknown:true, name:foodName, grams:finalGrams});
      }
    }

    setParsed(items);
  };

  // ── تحديث السعرات عند تغيير الكمية ─────────────────────
  const updateGrams = (i, newG) => {
    const raw = parseInt(newG)||0;
    const g = raw; // allow 0 while typing
    const gCal = Math.max(1, raw); // use at least 1 for cal calc
    setParsed(prev => prev.map((item,j) => {
      if(j!==i || !item.food) return {...item, grams:g};
      return {
        ...item, grams:g,
        cal:  Math.round(item.food.cal  * gCal/100),
        prot: Math.round(item.food.prot * gCal/100*10)/10,
        carb: Math.round(item.food.carb * gCal/100*10)/10,
        fat:  Math.round(item.food.fat  * gCal/100*10)/10,
        fiber:Math.round((item.food.fiber||0)*gCal/100*10)/10,
      };
    }));
  };

  const removeItem = (i) => setParsed(prev=>prev.filter((_,j)=>j!==i));

  const saveAll = () => {
    parsed.filter(i=>i.food).forEach(item => onAdd({
      id:Date.now()+Math.random(), nameAr:item.food.nameAr, grams:item.grams,
      cal:item.cal, prot:item.prot, carb:item.carb, fat:item.fat, fiber:item.fiber,
    }));
    setTxt(""); setParsed([]); onClose();
  };

  // ── البحث المباشر ────────────────────────────────────────
  useEffect(()=>{
    if(mode!=="search"){return;}
    const raw = txt.trim();
    if(raw.length<2){setResults([]);setSel(null);return;}
    // Extract grams hint
    const gm = raw.match(/(\d+)\s*(غرام|غ|g\b|جرام)?/i);
    if(gm && parseInt(gm[1])>=1) setGrams(parseInt(gm[1]));
    const cleaned = raw.replace(/\d+\s*(غرام|غ|g\b|جرام)?/gi,'').trim();
    const q = normalizeAr(cleaned||raw);
    if(!q){setResults([]);return;}
    const found = FOODS_NORM.filter(f=>
      f.normAr.includes(q)||(f.normFr&&normalizeAr(f.normFr).includes(q))||
      f.wordsAr.some(w=>w.length>2&&q.includes(w))
    ).slice(0,7);
    setResults(found.map(f=>f.f));
  },[txt,mode]);

  const doAdd = () => {
    if(!sel)return;
    const g=grams;
    onAdd({id:Date.now(),nameAr:sel.nameAr,grams:g,
      cal:Math.round(sel.cal*g/100),prot:Math.round(sel.prot*g/100*10)/10,
      carb:Math.round(sel.carb*g/100*10)/10,fat:Math.round(sel.fat*g/100*10)/10,
      fiber:Math.round((sel.fiber||0)*g/100*10)/10,
    });
    setTxt("");setResults([]);setSel(null);setGrams(100);onClose();
  };

  const totalCal = parsed.filter(i=>i.food).reduce((s,i)=>s+i.cal,0);
  const bg = dark?D.bgCardD:D.bgCard;
  const inp = {width:"100%",padding:"11px 14px",borderRadius:10,outline:"none",boxSizing:"border-box",
    border:`1.5px solid ${dark?D.borderD:D.border}`,fontSize:13,fontFamily:"'Segoe UI','Cairo',Arial,sans-serif",
    background:dark?"#1a1a2e":"#f8f8ff",color:dark?D.textD:D.text};

  return React.createElement('div',null

    // ── تبويبات ─────────────────────────────────────────
    ,React.createElement('div',{style:{display:"flex",gap:0,marginBottom:12,borderRadius:10,overflow:"hidden",border:`1px solid ${dark?D.borderD:D.border}`}}
      ,[["search","🔍 بحث"],["describe","✍️ وصف وجبتك"]].map(([m,l])=>
        React.createElement('button',{key:m,onClick:()=>{setMode(m);setTxt("");setResults([]);setSel(null);setParsed([]);},
          style:{flex:1,padding:"9px",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",transition:"all 0.2s",
            background:mode===m?D.red:"transparent",color:mode===m?"#fff":D.textMuted}},l)
      )
    )

    // ── وضع البحث ───────────────────────────────────────
    ,mode==="search"&&React.createElement('div',null
      ,React.createElement('input',{value:txt,onChange:e=>{setTxt(e.target.value);setSel(null);},
          placeholder:"مثال: كسكس 350 أو دجاج مشوي...",style:{...inp,marginBottom:8}})
      ,results.length>0&&!sel&&React.createElement('div',{style:{borderRadius:10,border:`1px solid ${dark?D.borderD:D.border}`,overflow:"hidden",marginBottom:10,maxHeight:200,overflowY:"auto"}}
        ,results.map(f=>React.createElement('div',{key:f.id,onClick:()=>{setSel(f);setResults([]);},
            style:{padding:"10px 14px",cursor:"pointer",borderBottom:`1px solid ${dark?D.borderD+"44":D.border}`,
              background:dark?D.bgCardD:D.bgCard,display:"flex",justifyContent:"space-between",alignItems:"center"}}
          ,React.createElement('div',null
            ,React.createElement('div',{style:{fontSize:13,fontWeight:700,color:dark?D.textD:D.text}},f.nameAr)
            ,React.createElement('div',{style:{fontSize:10,color:D.textMuted}},f.cal," kcal/100g"))
          ,React.createElement('span',{style:{fontSize:13,color:D.green,fontWeight:700}},"اختر")
        ))
      )
      ,sel&&React.createElement('div',{style:{padding:"12px 14px",borderRadius:10,marginBottom:10,background:dark?D.bgRaisedD:D.bgMuted,border:`1.5px solid ${D.green}66`}}
        ,React.createElement('div',{style:{fontWeight:700,fontSize:13,color:dark?D.textD:D.text,marginBottom:8}},sel.nameAr)
        ,React.createElement('div',{style:{display:"flex",gap:10,alignItems:"center",marginBottom:10}}
          ,React.createElement('span',{style:{fontSize:12,color:D.textMuted}},"الكمية:")
          ,React.createElement('input',{type:"number",value:grams===0||grams===""?"":grams,max:9999,
              onChange:e=>setGrams(e.target.value===''?'':parseInt(e.target.value)||0),
              onBlur:e=>{if(!e.target.value||parseInt(e.target.value)<1)setGrams(100);},
              style:{width:80,padding:"8px 10px",borderRadius:8,textAlign:"center",border:`1.5px solid ${dark?D.borderD:D.border}`,
                background:dark?"#222":D.bgCard,color:dark?D.textD:D.text,fontSize:15,fontWeight:700,fontFamily:"inherit",outline:"none"}})
          ,React.createElement('span',{style:{fontSize:12,color:D.textMuted}},"غرام")
          ,React.createElement('button',{onClick:()=>setSel(null),style:{marginRight:"auto",padding:"6px 10px",borderRadius:8,border:"none",background:D.redDim,color:D.red,cursor:"pointer",fontSize:12}},"✕ تغيير")
        )

// ERROR BOUNDARY - catches React render errors

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error:null}; }
  static getDerivedStateFromError(e) { return {error:e}; }
  componentDidCatch(e, info) { console.error("AC Calories Error:", e, info); }
  render() {
    if(this.state.error) {
      return React.createElement('div', {style:{padding:30,color:"#fff",background:"#0a0a0f",
        minHeight:"100vh",fontFamily:"monospace",direction:"ltr",display:"flex",
        flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}},
        React.createElement('div',{style:{fontSize:48}},"⚠️"),

        React.createElement('pre',{style:{whiteSpace:"pre-wrap",fontSize:11,
          background:"#111",padding:16,borderRadius:8,maxWidth:400,overflow:"auto",
          color:"#ff6b6b",direction:"ltr"}},
          this.state.error&&(this.state.error.stack||String(this.state.error))
        ),
        React.createElement('button',{onClick:()=>window.location.reload(),
          style:{padding:"12px 24px",background:"#D90429",color:"#fff",border:"none",
            borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:700}},
          "إعادة تحميل التطبيق"
        )
      );
    }
    return this.props.children;
  }
}

      if (over > 200) advice.push("قلّل المقليات والسكريات غداً");
      if (t.prot < g.protein * 0.7) advice.push("أضف مصدر بروتين (تونة/بيض/دجاج)");
      if (fiberVal < 15) advice.push("أضف خضاراً أو فاكهة للألياف");
      if (rem > 300 && todayCal > 0) advice.push(`لديك ${rem} كسعرة متبقية — لا تتجاهل وجبة`);

      const adviceStr = advice.length > 0 ? "\n\n💡 **نصائح:**\n" + advice.map(a => `• ${a}`).join("\n") : "";

      return `📊 **تقييم ${new Date().toLocaleDateString("ar-DZ", {weekday:"long", day:"numeric", month:"long"})}**\n\n${grade}${weightTip}\n\n**المغذيات:**\n• 🔥 السعرات: ${todayCal} / ${g.calories} كسعرة (${calPct}%)\n• 🔵 بروتين: ${protGrade} — ${Math.round(t.prot)}/${g.protein}g (${protPct}%)\n• 🟠 كارب: ${carbGrade} — ${Math.round(t.carb)}/${g.carbs}g\n• 🔴 دهون: ${fatGrade} — ${Math.round(t.fat)}/${g.fat}g\n• 🌾 ألياف: ${fiberGrade} ${fiberVal}/25g${adviceStr}`;
    }

    // ══════════════════════════════════════════════
    // 2. اقتراح وجبة
    // ══════════════════════════════════════════════
    if (has("اقتر","ماذا آكل","ماذا اكل","وجبة مناسبة","ماذا أتناول","ماذا اتناول","وش ناكل","وش ناخذ")) {
      if (rem <= 50) return "✅ **اكتملت سعراتك اليومية!**\n\nإذا جعت: كوب ماء دافئ أو شاي بالنعناع (≈2 كسعرة) أو خيارة طازجة (15 كسعرة).";

      if (rem < 150) return `🍎 **متبقي: ${rem} كسعرة — خيارات خفيفة:**\n• تفاحة = 95kcal ✅\n• 3 تمرات = 83kcal\n• كوب لبن رايب = 80kcal\n• 100g بطيخ أحمر = 30kcal\n• 50g زبادي طبيعي = 30kcal`;

      if (rem < 300) return `🥗 **متبقي: ${rem} كسعرة:**\n• بيضتان مسلوقتان + خيار = 175kcal ✅\n• كوب حريرة جزائرية = 95kcal\n• 150g زبادي يوناني + موز = 200kcal\n• علبة تونة صغيرة = 116kcal\n• 2 تمر + مفترشة لوز = 150kcal`;

      if (rem < 500) return `🥘 **متبقي: ${rem} كسعرة — وجبة خفيفة متكاملة:**\n• شكشوكة (2 بيض + طماطم) = 360kcal ✅ جزائري\n• كرنتيكة طبق = 280kcal ✅\n• سلطة دجاج مشوي + خضار = 300kcal\n• دوبارة نصف طبق = 185kcal ✅\n• فريك شوربة كوب + خبز = 200kcal\n\n💡 **تبويب "وصفات"** للتحضير خطوة بخطوة!`;

      return `🍽️ **متبقي: ${rem} كسعرة — وجبة كاملة:**\n• أرز بدجاج مشوي (300g) = 445kcal ✅\n• كسكس بالخضار (400g) = 360kcal ✅ جزائري\n• فريك بالدجاج (350g) = 380kcal ✅\n• حريرة + خبز الدار + لبن = 420kcal\n• شكشوكة + رغيف كامل = 480kcal\n• مكرونة تونة + سلطة = 440kcal\n\n💡 **تبويب "وصفات"** فيه 50+ وصفة بخطوات تحضير كاملة!`;
    }

    // ══════════════════════════════════════════════
    // 3. تحليل البروتين
    // ══════════════════════════════════════════════
    if (has("بروتين","proteines","protein","بروتيين")) {
      const def = Math.round(g.protein - t.prot);
      if (def <= 0) return `✅ **ممتاز! أكملت هدف البروتين**\n${Math.round(t.prot)}g من ${g.protein}g\n\n💡 للحفاظ على العضلات: وزّع البروتين على 4 وجبات، لا تتجاوز 40g في الوجبة الواحدة (الاستيعاب الأمثل).`;

      return `💪 **تحليل البروتين**\nاستهلكت ${Math.round(t.prot)}g من ${g.protein}g — **تحتاج ${def}g إضافية**\n\n**🥇 أفضل المصادر (لكل 100g):**\n• صدر دجاج مسلوق: **31g** (150kcal)\n• تونة معلبة: **25g** (116kcal) — أسرع حل\n• سردين مشوي: **24g** (208kcal)\n• سمك عجل مشوي: **24g** (125kcal)\n• بيض مسلوق: **13g** (155kcal)\n• لبنة: **10g** (175kcal)\n• حمص مطبوخ: **9g** (164kcal) ✅ نباتي\n• عدس أخضر: **9g** (116kcal) ✅ نباتي\n• زبادي يوناني: **10g** (59kcal) — أخف خيار\n\n**للوصول لـ ${def}g:**\n${def <= 25 ? `• علبة تونة (185g) = ${Math.round(185*0.25)}g ✅` : `• صدر دجاج ${Math.round(def/0.31*100)}g = ${def}g\n• أو: ${Math.ceil(def/13)} بيضات مسلوقة + علبة تونة`}\n\n⏰ أفضل وقت: مع كل وجبة رئيسية وبعد التمرين بساعة.`;
    }

    // ══════════════════════════════════════════════
    // 4. خطة التنشيف / إنقاص الوزن
    // ══════════════════════════════════════════════
    if (has("تنشيف","إنقاص وزن","انقاص وزن","خسارة وزن","نقصان وزن","تخسيس","diet","دايت","نزول وزن")) {
      const tdee = g.calories + Math.abs(Math.min(diff, 0));
      const base = Math.round(g.calories <= 2000 ? g.calories * 1.15 : g.calories);
      return `⚖️ **خطة التنشيف المثلى**\n\nـ TDEE المقدّر: ~**${base}** كسعرة/يوم\nـ هدفك الحالي: **${g.calories}** كسعرة\n\n**🎯 خيارات العجز الحراري:**\n| العجز | السعرات | الخسارة |\n|-------|---------|----------|\n| خفيف −250 | ${base-250} | −0.23كغ/أسبوع |\n| معتدل −500 | ${base-500} | −0.46كغ/أسبوع ⭐ |\n| قوي −750 | ${base-750} | −0.70كغ/أسبوع |\n\n⭐ **العجز 500 موصى به** — آمن، مستدام، يحافظ على العضلات\n\n**💡 نصائح عملية:**\n• المشي 30 دق يومياً = −150kcal إضافية\n• قلّل السكر والمقليات أولاً (أعلى كثافة حرارية)\n• ابقَ فوق ${Math.round(Math.max(1200, base*0.75))} كسعرة دائماً\n• الحفاظ على ${g.protein}g بروتين يومياً لحماية العضلات\n• النوم 7-8 ساعات يرفع هرمونات الشبع`;
    }

    // ══════════════════════════════════════════════
    // 5. بناء العضلات / التضخيم
    // ══════════════════════════════════════════════
    if (has("عضل","تضخيم","بناء عضل","زيادة وزن","mass","bulk")) {
      const protPerKg = (g.protein / (profile.weight || 70)).toFixed(1);
      const ideal = parseFloat(protPerKg) >= 1.6 ? "✅ مثالي" : "⚠️ يُنصح بالزيادة إلى 1.6-2.2g/كغ";
      return `💪 **خطة بناء العضلات**\n\nـ هدف السعرات: **${g.calories}** كسعرة (فائض +200-300 مقترح)\nـ البروتين الحالي: **${g.protein}g** = ${protPerKg}g/كغ وزن ${ideal}\n\n**🏋️ وجبة ما قبل التمرين (1-2 ساعة قبل):**\n• أرز + صدر دجاج + خضار = 520kcal / P:45g\n• شوفان بالموز والعسل = 280kcal / P:12g\n\n**🥩 وجبة بعد التمرين (خلال 60 دق):**\n• صدر دجاج 200g + أرز 150g = 500kcal / **P:52g** ⭐\n• تونة + بطاطا مسلوقة + بيض = 420kcal / P:46g\n• زبادي يوناني + موز + لوز = 340kcal / P:22g\n\n**📅 التوزيع الأمثل:**\n4-5 وجبات/يوم بفارق 3-4 ساعات\n\n💡 تبويب **"وصفات"** ← "بروتين بار التمر واللوز" 🍫`;
    }

    // ══════════════════════════════════════════════
    // 6. الترطيب والماء
    // ══════════════════════════════════════════════
    if (has("ماء","شرب","ترطيب","مياه","تجفاف","hydrat")) {
      const wt = profile.weight || 70;
      const ml = Math.round(wt * 35);
      const cups = Math.round(ml / 250);
      return `💧 **الترطيب اليومي**\n\nوزنك ${wt}كغ → تحتاج **${ml}ml يومياً (≈${cups} أكواب 250ml)**\n\n**⏰ التوزيع المثالي:**\n• الاستيقاظ: كوبان قبل الفطور 🌅\n• منتصف الصباح: كوب 🌤️\n• قبل الغداء: كوب 🍽️\n• بعد الغداء: كوبان 💧\n• المساء: كوب 🌙\n\n**⚠️ انتبه:**\n• الرياضة: +300-500ml لكل ساعة تمرين\n• الصيف الجزائري: +500-700ml\n• القهوة والشاي لا يحسبان (مُدرّان للبول)\n• البول الأصفر الفاتح = ترطيب جيد ✅\n• العطش = بدأت تتجفف بالفعل`;
    }

    // ══════════════════════════════════════════════
    // 7. الحلويات الجزائرية
    // ══════════════════════════════════════════════
    if (has("حلوي","حلوة","حلواي","حلويات","مقروط","بقلاوة","زلابية","قلب اللوز","تشاراك","سفنج","تمينة","بريوات","شباكية","دلوز")) {
      return `🍯 **سعرات الحلويات الجزائرية (لكل 100g)**\n\n**🔴 عالية جداً:**\n• لوزينة: 495kcal\n• قلب اللوز: 490kcal\n• شباكية (مغربية): 480kcal\n• حلوى اللوز: 480kcal\n• بقلاوة: 470kcal\n• زلابية: 430kcal\n• سفنج: 340kcal\n\n**🟠 متوسطة إلى عالية:**\n• مقروط التمر (فرن): 370kcal ← صحي أكثر\n• كعب الغزال: 420kcal\n• تمينة: 450kcal\n\n**🟢 الأفضل للحلاوة الطبيعية:**\n• تمر (3 حبات ≈45g): 125kcal\n• تمر + لوز (5 حبات + 5 لوزات): 165kcal\n• شوكولاتة داكنة 85% (2 مربعات 20g): 120kcal\n\n💡 **نصيحة:** قطعة حلوى واحدة صغيرة (≈30-35g) = 140-175kcal — يمكن الاستمتاع بها بعد وجبة رئيسية خفيفة.`;
    }

    // ══════════════════════════════════════════════
    // 8. الأكلات الجزائرية — قيم تفصيلية
    // ══════════════════════════════════════════════
    if (has("كسكس","كسكسي","جزائر","حريرة","فريك","دوبارة","رشتة","بركوكس","مرقة","جزائرية","اكلة جزائ")) {
      return `🇩🇿 **الأكلات الجزائرية (لكل 100g)**\n\n**✅ خفيفة ومغذية:**\n• حريرة: 95kcal / P:6g / F:3g\n• شوربة فريك: 95kcal / P:5g\n• دوبارة: 185kcal / P:9g (حمص غني بالألياف)\n• شكشوكة: 120kcal / P:7g\n• دشيشة: 110kcal / P:4g\n\n**🟠 معتدلة:**\n• مرمز: 170kcal / P:11g\n• كسكس بالخضار: 155kcal / P:5g\n• رشتة: 160kcal / P:7g\n• فريك بالدجاج: 165kcal / P:14g ⭐\n• طبسي البطاطا: 145kcal / P:5g\n\n**🔴 ثقيلة:**\n• كسكس باللحم: 195kcal / P:14g\n• مسمن (عادي): 380kcal\n• مسمن مع عسل: 380kcal (ارفع بالفرن)\n• قديد: 280kcal / P:45g (عالي البروتين لكن مالح)\n\n💡 أفضل خيار يومي: **فريك بالدجاج** — بروتين عالٍ + ألياف + طعم جزائري أصيل!`;
    }

    // ══════════════════════════════════════════════
    // 9. الشكشوكة — تفصيل
    // ══════════════════════════════════════════════
    if (has("شكشوك","بيض بطماطم","بيض طماطم","بيض بالطماطم")) {
      return `🍳 **الشكشوكة — تحليل غذائي**\n\nلكل 100g: 120kcal / P:7g / C:8g / F:7g\n\n**وجبة كاملة (300g ≈ طبق عادي):**\n• السعرات: ~360kcal\n• بروتين: ~21g ✅ ممتاز\n• كارب: ~24g\n• دهون: ~21g (من الزيت والبيض)\n• ألياف: ~4.5g\n\n**✅ فوائد:**\n• بروتين جيد من البيض\n• فيتامين C وB12\n• ليكوبين من الطماطم (مضاد أكسدة)\n\n**💡 للتخفيف:**\n• الزيت ← ملعقة صغيرة فقط = توفير 60kcal\n• بيضتان بدل ثلاث = توفير 60kcal\n• أضف مزيد طماطم وفلفل لحجم أكبر بسعرات أقل\n\n**🔄 نسخة محسّنة:** بدون زيت في الفرن (30 دق) = ~280kcal للطبق\n\n💡 تبويب "وصفات" ← شكشوكة صحية خطوة بخطوة!`;
    }

    // ══════════════════════════════════════════════
    // 10. البدائل الصحية
    // ══════════════════════════════════════════════
    if (has("بديل","بدائل","صحي اكثر","أخف","اخف","بدل","عوض")) {
      return `🔄 **بدائل صحية جزائرية وعالمية**\n\n**وفّر السعرات:**\n• مسمن → **بغرير** (توفير 150kcal)\n• مقروط مقلي → **مقروط فرن** (توفير 210kcal)\n• بقلاوة → **تمر+لوز** (توفير 300kcal)\n• أرز أبيض → **أرز أسمر** (+ألياف/بروتين)\n• مكرونة → **كينوا** (2× بروتين)\n• محاجب → **كرنتيكة** (توفير 180kcal)\n• قهوة بحليب كامل → **قهوة بلبن رايب** (توفير 30kcal)\n• عصير معلب → **عصير ليمون طازج** (توفير 50kcal)\n• بطاطا مقلية → **بطاطا فرن** (توفير 220kcal!)\n• خبز أبيض → **خبز قمح كامل** (+7g ألياف)\n\n**زِد المغذيات بدون سعرات:**\n• أضف نعناع/بقدونس/كزبرة (تقريباً 0kcal)\n• استبدل ملح بكركم+كمون+كزبرة\n• أضف خل التفاح للسلطة (صفر سعرات تقريباً)\n\n💡 تبويب **"وصفات"** فيه نسخ صحية كاملة!`;
    }

    // ══════════════════════════════════════════════
    // 11. السعرات في طعام محدد
    // ══════════════════════════════════════════════
    if (has("كم سعر","كم كسعر","كالوري","سعرات في","كم فيها","قيمة غذائية","معلومات غذائية")) {
      // Extract food name from message
      const foodSearch = lm.replace(/كم سعر.{0,4}في|كم كسعر.{0,4}في|كالوري|سعرات في|كم فيها|قيمة غذائية|معلومات غذائية/g,"").trim();
      if (foodSearch.length > 1) {
        return `🔍 **للبحث عن "${foodSearch}":**\n\n• تبويب **"الوجبة"** ← "+" ← اكتب اسم الطعام\n• النظام يبحث في قاعدة **600 طعام** مع تعرّف تلقائي على الأسماء الدارجة\n• ضبط الكمية بالغرام لحساب دقيق\n\n💡 **تقدير سريع لـ "${foodSearch}":**\nاكتب لي أكثر تفصيلاً وسأعطيك قيماً تقديرية.`;
      }
      return `🔍 **كيف تعرف سعرات أي طعام:**\n• تبويب "الوجبة" ← "+" ← اكتب الطعام بالعربي أو الفرنسية\n• قاعدة بيانات تشمل 600 طعام جزائري وعالمي\n• أو اسألني: "كم سعرات في [اسم الطعام]"`;
    }

    // ══════════════════════════════════════════════
    // 12. الألياف
    // ══════════════════════════════════════════════
    if (has("ألياف","الياف","fiber","إمساك","هضم","أمعاء")) {
      const fiberDef = Math.max(0, 25 - fiberVal);
      return `🌾 **الألياف الغذائية**\n\nاستهلكت اليوم: **${fiberVal}g** من هدف 25g ${fiberVal >= 25 ? "✅" : `— تحتاج ${fiberDef}g إضافية`}\n\n**🥇 أغنى المصادر بالألياف:**\n• نخالة القمح: 43g/100g ← الأعلى!\n• حبة البركة: 9g/100g\n• بذور الشيا: 34g/100g\n• بذور الكتان: 27g/100g\n• فاصوليا خضراء مطبوخة: 3.4g\n• حمص مطبوخ: 8g/100g ✅ جزائري\n• عدس أخضر: 8g/100g ✅\n• تين طازج: 3g/100g\n• بروكلي: 3g/100g\n• تمر: 7g/100g ✅\n\n**🍽️ وصفة سريعة لرفع الألياف:**\nأضف للغداء: كوب عدس مطبوخ + برتقالة = +10g ألياف\n\n💡 ابدأ تدريجياً وارفع كمية الماء مع زيادة الألياف`;
    }

    // ══════════════════════════════════════════════
    // 13. الدهون
    // ══════════════════════════════════════════════
    if (has("دهون","دهن","fat","شحوم","كولسترول","أوميغا","أوميجا")) {
      return `🔴 **الدهون الغذائية**\n\nاستهلكت: **${Math.round(t.fat)}g** من ${g.fat}g ${fatPct <= 100 ? "✅" : "⚠️ تجاوزت"}\n\n**✅ دهون صحية (غير مشبعة):**\n• زيت الزيتون البكر: 884kcal/100g (أوميغا 9)\n• أفوكادو: 160kcal/100g (دهون قلبية)\n• لوز نيء: 579kcal (أوميغا 3+6)\n• جوز: 654kcal (أعلى أوميغا 3 من النباتات)\n• سمك السلمون/الرنجة/السردين: أوميغا 3 ⭐\n• بذور الشيا/الكتان: أوميغا 3 نباتي\n\n**❌ دهون يجب تقليلها:**\n• الزبدة والسمن النباتي المهدرج\n• المقليات (زيت مؤكسد)\n• اللحوم الدهنية المصنّعة\n\n💡 لا تخف من الدهون الصحية — تُشبع أكثر وتحمي القلب!`;
    }

    // ══════════════════════════════════════════════
    // 14. الكارب / السكريات
    // ══════════════════════════════════════════════
    if (has("كارب","كربوهيدر","سكر","نشا","carb","خبز كثير","أرز كثير")) {
      return `🟠 **الكربوهيدرات والسكريات**\n\nاستهلكت: **${Math.round(t.carb)}g** من ${g.carbs}g ${carbPct <= 100 ? "✅" : "⚠️ تجاوزت"}\n\n**✅ كارب صحية (مركّبة):**\n• أرز أسمر: 23g/100g + 1.8g ألياف\n• شوفان: 12g/100g (يطلق ببطء)\n• كينوا: 21g/100g + 2.8g ألياف + بروتين\n• عدس: 20g/100g + 8g ألياف\n• بطاطا مسلوقة: 17g/100g (لا تقلها!)\n• خبز قمح كامل: 41g/100g + 7g ألياف\n\n**❌ كارب بسيطة (حدّد استهلاكها):**\n• سكر أبيض: 100g/100g (فارغ)\n• خبز أبيض: 53g + ألياف نادرة\n• أرز أبيض: 28g (رافع سريع للسكر)\n• المشروبات الحلوة والعصائر المعلبة\n\n💡 **مؤشر الأنسولين:** تناول كارب مع بروتين أو دهون يبطّئ رفع السكر في الدم.`;
    }
